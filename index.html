<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roteirizador kiki</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f172a; color: #e2e8f0; }
        .container { display: flex; flex-direction: column; height: 100dvh; max-width: 100vw; }
        .topbar { background: #1e293b; padding: 12px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; justify-content: space-between; }
        .btn { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn:active { background: #2563eb; }
        .btn-small { padding: 6px 12px; font-size: 0.9rem; }
        .btn-danger { background: #ef4444; }
        .btn-success { background: #10b981; }
        .flex { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .main { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 340px; background: #1e293b; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
        .map-container { flex: 1; min-height: 300px; }
        #map { height: 100%; width: 100%; }
        html, body, .container, .main, .map-container, #map { height: 100%; min-height: 300px; }
        .stop-item { background: #334155; padding: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; cursor: grab; }
        .stop-item.dragging { opacity: 0.5; }
        .stop-status { padding: 4px 8px; border-radius: 12px; font-size: 0.8rem; }
        .status-pendente { background: #facc15; color: #000; }
        .status-entregue { background: #10b981; color: #fff; }
        .status-nao_encontrado, .status-pessoa_nao_localizada, .status-endereco_errado { background: #ef4444; color: #fff; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #1e293b; padding: 20px; border-radius: 12px; width: 90%; max-width: 500px; }
        input, select, textarea { width: 100%; padding: 10px; margin: 6px 0; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: #e2e8f0; }
        .video-container { position: relative; width: 100%; background: black; border-radius: 8px; overflow: hidden; }
        video { width: 100%; display: block; }
        canvas { display: none; }
        @media (max-width: 700px) { .main { flex-direction: column; } .sidebar { width: 100%; max-height: 40vh; } }
        .loader { border: 3px solid #475569; border-top: 3px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">
    <div class="topbar">
        <strong>📦 Roteirizador DeepSeek</strong>
        <div class="flex">
            <button class="btn btn-small" onclick="abrirAdicionar()">+ Endereço</button>
            <button class="btn btn-small btn-success" onclick="otimizarRota()">🗺️ Otimizar Rota</button>
            <button class="btn btn-small" onclick="verRelatorio()">📊 Relatório</button>
        </div>
    </div>
    <div class="main">
        <div class="sidebar" id="lista-stops"><p style="text-align:center;color:#94a3b8;">Nenhum pacote adicionado</p></div>
        <div class="map-container"><div id="map"></div></div>
    </div>
</div>
<div class="modal" id="modal-add"><div class="modal-content"><h3>Adicionar pacote</h3><input type="text" id="endereco-input" placeholder="Digite o endereço completo"><div class="flex" style="margin:8px 0;"><button class="btn btn-small" onclick="iniciarScanner()">📷 Escanear com câmera</button></div><div class="video-container" id="video-container" style="display:none;"><video id="video" autoplay playsinline></video><button class="btn btn-small" onclick="capturarFoto()" style="position:absolute;bottom:10px;left:10px;">📸 Capturar</button></div><canvas id="canvas"></canvas><div id="ocr-result" style="margin:8px 0; color:#facc15;"></div><div class="flex" style="justify-content:flex-end; margin-top:12px;"><button class="btn btn-small" onclick="fecharModal('modal-add')">Cancelar</button><button class="btn btn-small btn-success" onclick="adicionarEndereco()">✅ Adicionar</button></div></div></div>
<div class="modal" id="modal-relatorio"><div class="modal-content" style="max-height:80vh;overflow-y:auto;"><h3>📊 Relatório de Entregas</h3><div id="relatorio-conteudo"></div><button class="btn btn-small" onclick="exportarCSV()">📥 Baixar CSV</button><button class="btn btn-small" onclick="fecharModal('modal-relatorio')">Fechar</button></div></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script src="https://unpkg.com/@mapbox/polyline@1.1.1/src/polyline.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="script.js"></script>
</body>
</html>
