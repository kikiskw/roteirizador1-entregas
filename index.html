<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roteirizador kiki</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f172a; color: #e2e8f0; }
        .container { display: flex; flex-direction: column; height: 100dvh; max-width: 100vw; }
        .topbar { background: #1e293b; padding: 12px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; justify-content: space-between; }
        .btn { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn:active { background: #2563eb; }
        .btn-small { padding: 6px 12px; font-size: 0.9rem; }
        .btn-danger { background: #ef4444; }
        .btn-success { background: #10b981; }
        .flex { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .main { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 340px; background: #1e293b; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
        .map-container { flex: 1; min-height: 300px; }
        #map { height: 100%; width: 100%; }
        .stop-item { background: #334155; padding: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; cursor: grab; }
        .stop-item.dragging { opacity: 0.5; }
        .stop-status { padding: 4px 8px; border-radius: 12px; font-size: 0.8rem; }
        .status-pendente { background: #facc15; color: #000; }
        .status-entregue { background: #10b981; color: #fff; }
        .status-nao_encontrado, .status-pessoa_nao_localizada, .status-endereco_errado { background: #ef4444; color: #fff; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #1e293b; padding: 20px; border-radius: 12px; width: 90%; max-width: 500px; }
        input, select, textarea { width: 100%; padding: 10px; margin: 6px 0; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: #e2e8f0; }
        .video-container { position: relative; width: 100%; background: black; border-radius: 8px; overflow: hidden; }
        video { width: 100%; display: block; }
        canvas { display: none; }
        @media (max-width: 700px) {
            .main { flex-direction: column; }
            .sidebar { width: 100%; max-height: 40vh; }
        }
        .loader { border: 3px solid #475569; border-top: 3px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="topbar">
            <strong>📦 Roteirizador DeepSeek</strong>
            <div class="flex">
                <button class="btn btn-small" onclick="abrirAdicionar()">+ Endereço</button>
                <button class="btn btn-small btn-success" onclick="otimizarRota()">🗺️ Otimizar Rota</button>
                <button class="btn btn-small" onclick="verRelatorio()">📊 Relatório</button>
            </div>
        </div>
        <div class="main">
            <div class="sidebar" id="lista-stops">
                <p style="text-align:center;color:#94a3b8;">Nenhum pacote adicionado</p>
            </div>
            <div class="map-container">
                <div id="map"></div>
            </div>
        </div>
    </div>

    <!-- Modal adicionar endereço -->
    <div class="modal" id="modal-add">
        <div class="modal-content">
            <h3>Adicionar pacote</h3>
            <input type="text" id="endereco-input" placeholder="Digite o endereço completo">
            <div class="flex" style="margin:8px 0;">
                <button class="btn btn-small" onclick="iniciarScanner()">📷 Escanear com câmera</button>
            </div>
            <div class="video-container" id="video-container" style="display:none;">
                <video id="video" autoplay playsinline></video>
                <button class="btn btn-small" onclick="capturarFoto()" style="position:absolute;bottom:10px;left:10px;">📸 Capturar</button>
            </div>
            <canvas id="canvas"></canvas>
            <div id="ocr-result" style="margin:8px 0; color:#facc15;"></div>
            <div class="flex" style="justify-content:flex-end; margin-top:12px;">
                <button class="btn btn-small" onclick="fecharModal('modal-add')">Cancelar</button>
                <button class="btn btn-small btn-success" onclick="adicionarEndereco()">✅ Adicionar</button>
            </div>
        </div>
    </div>

    <!-- Modal relatório -->
    <div class="modal" id="modal-relatorio">
        <div class="modal-content" style="max-height:80vh;overflow-y:auto;">
            <h3>📊 Relatório de Entregas</h3>
            <div id="relatorio-conteudo"></div>
            <button class="btn btn-small" onclick="exportarCSV()">📥 Baixar CSV</button>
            <button class="btn btn-small" onclick="fecharModal('modal-relatorio')">Fechar</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://unpkg.com/@mapbox/polyline@1.1.1/src/polyline.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <script>
        // ============= CONFIGURAÇÃO =============
        const ORS_API_KEY = 'COLE_SUA_CHAVE_AQUI'; // <-- SUBSTITUA PELA SUA CHAVE
        const NOMINATIM_URL = 'https://nominatim.openstreetmap.org/search?format=json&limit=1&q=';

        // ============= ESTADO =============
        let stops = []; // { id, address, lat, lon, status, ordem }
        let userLocation = null;
        let rotaGeometry = null;
        let mapa, camadaRota, marcadoresLayer;

        // Carregar do localStorage
        function carregarDados() {
            const data = localStorage.getItem('stops_roteirizador');
            if (data) stops = JSON.parse(data);
            atualizarLista();
        }
        function salvarDados() {
            localStorage.setItem('stops_roteirizador', JSON.stringify(stops));
        }

        // ============= MAPA =============
        function initMapa() {
            mapa = L.map('map').setView([-15.78, -47.93], 5); // Brasil central
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(mapa);
            marcadoresLayer = L.layerGroup().addTo(mapa);
            camadaRota = L.polyline([], { color: '#3b82f6', weight: 5 }).addTo(mapa);
            atualizarMarcadores();
        }

        function atualizarMarcadores() {
            marcadoresLayer.clearLayers();
            stops.forEach((stop, idx) => {
                if (stop.lat && stop.lon) {
                    const marker = L.marker([stop.lat, stop.lon], {
                        draggable: false,
                        icon: L.divIcon({
                            className: '',
                            html: `<div style="background:#3b82f6;color:white;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;">${idx+1}</div>`,
                            iconSize: [24, 24],
                            iconAnchor: [12, 12]
                        })
                    }).bindPopup(`<b>${idx+1}.</b> ${stop.address}`);
                    marcadoresLayer.addLayer(marker);
                }
            });
            if (userLocation) {
                L.marker([userLocation.lat, userLocation.lon], {
                    icon: L.divIcon({
                        className: '',
                        html: '<div style="background:#10b981;color:white;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;">📍</div>',
                        iconSize: [24, 24],
                        iconAnchor: [12, 12]
                    })
                }).addTo(marcadoresLayer).bindPopup('🏠 Sua localização (início)');
            }
        }

        async function desenharRota(pontosOrdenados) {
            if (pontosOrdenados.length < 2) {
                camadaRota.setLatLngs([]);
                return;
            }
            try {
                const coords = pontosOrdenados.map(p => [p.lon, p.lat]);
                const body = { coordinates: coords };
                const resp = await fetch('https://api.openrouteservice.org/v2/directions/driving-car/geojson', {
                    method: 'POST',
                    headers: {
                        'Authorization': ORS_API_KEY,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(body)
                });
                if (!resp.ok) throw new Error('Erro ao traçar rota');
                const data = await resp.json();
                const geometry = data.features[0].geometry;
                camadaRota.setLatLngs(L.GeoJSON.coordsToLatLngs(geometry.coordinates));
                mapa.fitBounds(L.geoJSON(data.features[0]).getBounds(), { padding: [30, 30] });
            } catch (e) {
                alert('Falha ao desenhar rota. Verifique a chave API ou a conexão.');
                console.error(e);
            }
        }

        // ============= GEOLOCALIZAÇÃO DO USUÁRIO =============
        function obterLocalizacaoUsuario() {
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) {
                    reject('Geolocalização não suportada');
                    return;
                }
                navigator.geolocation.getCurrentPosition(
                    pos => resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude }),
                    err => reject('Permita o acesso à localização para definir o ponto de partida')
                );
            });
        }

        // ============= GEOCODIFICAÇÃO DE ENDEREÇOS =============
        async function geocodificarEndereco(address) {
            const resp = await fetch(NOMINATIM_URL + encodeURIComponent(address), {
                headers: { 'User-Agent': 'RoteirizadorDeepSeek/1.0' }
            });
            if (!resp.ok) throw new Error('Falha no geocoding');
            const data = await resp.json();
            if (data.length === 0) throw new Error('Endereço não encontrado');
            return { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon) };
        }

        // ============= ADICIONAR ENDEREÇO (MANUAL / OCR) =============
        function abrirAdicionar() {
            document.getElementById('modal-add').style.display = 'flex';
            document.getElementById('endereco-input').value = '';
            document.getElementById('ocr-result').innerText = '';
            document.getElementById('video-container').style.display = 'none';
            pararCamera();
        }
        function fecharModal(id) {
            document.getElementById(id).style.display = 'none';
            pararCamera();
        }

        let streamCamera = null;
        async function iniciarScanner() {
            const container = document.getElementById('video-container');
            container.style.display = 'block';
            try {
                streamCamera = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                const video = document.getElementById('video');
                video.srcObject = streamCamera;
                video.play();
            } catch (e) {
                alert('Não foi possível acessar a câmera. Use a digitação manual.');
                container.style.display = 'none';
            }
        }
        function pararCamera() {
            if (streamCamera) {
                streamCamera.getTracks().forEach(t => t.stop());
                streamCamera = null;
            }
            const video = document.getElementById('video');
            if (video) video.srcObject = null;
        }

        function capturarFoto() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const imgData = canvas.toDataURL('image/jpeg');
            document.getElementById('ocr-result').innerHTML = '<span class="loader"></span> Reconhecendo texto...';
            Tesseract.recognize(imgData, 'por')
                .then(({ data: { text } }) => {
                    document.getElementById('ocr-result').innerText = 'Texto detectado: ' + text;
                    document.getElementById('endereco-input').value = text.trim();
                    pararCamera();
                    document.getElementById('video-container').style.display = 'none';
                })
                .catch(err => {
                    document.getElementById('ocr-result').innerText = 'Erro no OCR. Digite manualmente.';
                    pararCamera();
                    document.getElementById('video-container').style.display = 'none';
                });
        }

        async function adicionarEndereco() {
            const input = document.getElementById('endereco-input').value.trim();
            if (!input) return alert('Digite ou escaneie um endereço!');
            const btn = event.target;
            btn.disabled = true;
            btn.innerText = 'Geocodificando...';
            try {
                const { lat, lon } = await geocodificarEndereco(input);
                stops.push({
                    id: Date.now(),
                    address: input,
                    lat, lon,
                    status: 'pendente',
                    ordem: stops.length
                });
                salvarDados();
                atualizarLista();
                atualizarMarcadores();
                fecharModal('modal-add');
            } catch (e) {
                alert('Endereço não encontrado. Verifique e tente novamente.');
            } finally {
                btn.disabled = false;
                btn.innerText = '✅ Adicionar';
            }
        }

        // ============= LISTA DE STOPS (ARRÁSTÁVEL) =============
        function atualizarLista() {
            const container = document.getElementById('lista-stops');
            if (stops.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:#94a3b8;">Nenhum pacote adicionado</p>';
                camadaRota.setLatLngs([]);
                return;
            }
            container.innerHTML = '';
            stops.forEach((stop, idx) => {
                const div = document.createElement('div');
                div.className = 'stop-item';
                div.setAttribute('data-id', stop.id);
                div.innerHTML = `
                    <div>
                        <strong>${idx+1}.</strong> ${stop.address.substring(0, 40)}...
                        <br><span class="stop-status status-${stop.status}">${traduzStatus(stop.status)}</span>
                    </div>
                    <div>
                        <select onchange="alterarStatus(${stop.id}, this.value)" style="width:auto;padding:4px;">
                            <option value="pendente" ${stop.status==='pendente'?'selected':''}>Pendente</option>
                            <option value="entregue" ${stop.status==='entregue'?'selected':''}>Entregue</option>
                            <option value="nao_encontrado" ${stop.status==='nao_encontrado'?'selected':''}>End. não encontrado</option>
                            <option value="pessoa_nao_localizada" ${stop.status==='pessoa_nao_localizada'?'selected':''}>Pessoa não localizada</option>
                            <option value="endereco_errado" ${stop.status==='endereco_errado'?'selected':''}>Endereço errado</option>
                        </select>
                        <button class="btn btn-small btn-danger" onclick="removerStop(${stop.id})">🗑️</button>
                    </div>
                `;
                container.appendChild(div);
            });
            new Sortable(container, {
                animation: 150,
                onEnd: async function () {
                    const novaOrdem = Array.from(container.children).map(el => parseInt(el.getAttribute('data-id')));
                    stops = novaOrdem.map(id => stops.find(s => s.id === id));
                    stops.forEach((s, i) => s.ordem = i);
                    salvarDados();
                    atualizarMarcadores();
                    if (userLocation) {
                        const todosPontos = [{ lat: userLocation.lat, lon: userLocation.lon }, ...stops];
                        await desenharRota(todosPontos);
                    } else {
                        await desenharRota(stops);
                    }
                }
            });
        }

        function traduzStatus(s) {
            const map = { pendente:'Pendente', entregue:'Entregue', nao_encontrado:'End. não encontrado', pessoa_nao_localizada:'Pessoa não localizada', endereco_errado:'End. errado' };
            return map[s] || s;
        }

        function alterarStatus(id, novoStatus) {
            const stop = stops.find(s => s.id === id);
            if (stop) stop.status = novoStatus;
            salvarDados();
            atualizarLista();
        }

        function removerStop(id) {
            stops = stops.filter(s => s.id !== id);
            stops.forEach((s, i) => s.ordem = i);
            salvarDados();
            atualizarLista();
            atualizarMarcadores();
            if (stops.length < 2) camadaRota.setLatLngs([]);
        }

        // ============= OTIMIZAR ROTA (API ORS) =============
        async function otimizarRota() {
            if (stops.length === 0) return alert('Adicione pelo menos um endereço.');
            try {
                // Tenta obter localização do usuário
                if (!userLocation) {
                    try {
                        userLocation = await obterLocalizacaoUsuario();
                    } catch (e) {
                        alert('Não foi possível obter sua localização. O ponto de partida será o primeiro endereço.');
                        userLocation = { lat: stops[0].lat, lon: stops[0].lon };
                    }
                }
                const start = userLocation;
                // Monta jobs (entregas)
                const jobs = stops.map((s, i) => ({
                    id: i,
                    location: [s.lon, s.lat],
                    service: 300 // tempo fixo de 5 min por parada
                }));
                const body = {
                    jobs: jobs,
                    vehicles: [{
                        id: 0,
                        profile: 'driving-car',
                        start: [start.lon, start.lat],
                        end: [start.lon, start.lat] // volta ao início
                    }]
                };
                const resp = await fetch('https://api.openrouteservice.org/optimization', {
                    method: 'POST',
                    headers: {
                        'Authorization': ORS_API_KEY,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(body)
                });
                if (!resp.ok) {
                    const err = await resp.text();
                    throw new Error(err);
                }
                const data = await resp.json();
                if (data.routes && data.routes.length > 0) {
                    const rota = data.routes[0];
                    const order = rota.steps
                        .filter(s => s.type === 'job')
                        .map(s => s.job); // id do job
                    // Reordena stops conforme otimização
                    const novaOrdem = order.map(jobId => stops[jobId]);
                    stops = novaOrdem;
                    stops.forEach((s, i) => s.ordem = i);
                    salvarDados();
                    atualizarLista();
                    atualizarMarcadores();
                    // Desenha a rota otimizada (inclui ida e volta)
                    const routeGeometry = polyline.decode(rota.geometry);
                    const latlngs = routeGeometry.map(([lat, lon]) => [lat, lon]);
                    camadaRota.setLatLngs(latlngs);
                    mapa.fitBounds(camadaRota.getBounds(), { padding: [30, 30] });
                    alert('✅ Rota otimizada! Siga a ordem da lista.');
                }
            } catch (e) {
                console.error(e);
                alert('Erro ao otimizar rota. Verifique sua chave API ou endereços.');
            }
        }

        // ============= RELATÓRIO =============
        function verRelatorio() {
            const modal = document.getElementById('modal-relatorio');
            const div = document.getElementById('relatorio-conteudo');
            const total = stops.length;
            const entregues = stops.filter(s => s.status === 'entregue').length;
            const pendentes = stops.filter(s => s.status === 'pendente').length;
            const problemas = stops.filter(s => ['nao_encontrado','pessoa_nao_localizada','endereco_errado'].includes(s.status)).length;
            let html = `<p><b>Total:</b> ${total} pacotes</p>`;
            html += `<p>✅ Entregues: ${entregues}</p>`;
            html += `<p>⏳ Pendentes: ${pendentes}</p>`;
            html += `<p>⚠️ Problemas: ${problemas}</p>`;
            html += `<table style="width:100%; border-collapse:collapse; margin-top:12px;">
                <tr style="background:#334155;"><th>#</th><th>Endereço</th><th>Status</th></tr>`;
            stops.forEach((s, i) => {
                html += `<tr><td>${i+1}</td><td>${s.address}</td><td>${traduzStatus(s.status)}</td></tr>`;
            });
            html += `</table>`;
            div.innerHTML = html;
            modal.style.display = 'flex';
        }

        function exportarCSV() {
            let csv = 'Ordem;Endereço;Status\n';
            stops.forEach((s, i) => {
                csv += `${i+1};"${s.address}";${traduzStatus(s.status)}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'relatorio_entregas.csv';
            link.click();
        }

        // ============= NAVEGAÇÃO EXTERNA =============
        function navegarPara(lat, lon) {
            window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}`, '_blank');
        }

        // ============= INICIALIZAÇÃO =============
        window.onload = () => {
            carregarDados();
            initMapa();
            // fechar modais ao clicar fora
            window.onclick = (e) => {
                if (e.target.classList.contains('modal')) e.target.style.display = 'none';
            }
        };

        // Registrar Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
